site_name: Procheson立式机功能整理文档
site_url: https://docs.procheson.com
site_description: Procheson立式机功能模块技术文档

theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.toc
    - toc.integrate
    - toc.follow
    - navigation.top
    - search.suggest
    - search.highlight
  repo_url: ""
  repo_icon: "none"
  custom_dir: "theme"
  toc:
    permalink: true
    title: 目录
    depth: 4

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid

# 添加自定义CSS来调整布局
extra_css:
  - styles.css

nav:

  - 开合模功能: 01_开合模功能整理.md
  - 调模功能: 02_调模功能整理.md
  - 射出功能: 03_射出功能整理.md
  - 吹气功能: 04_吹气功能整理.md
  - 储料清料功能: 05_储料清料功能整理.md
  - 座台功能: 06_座台功能整理.md
  - 托模功能: 07_托模功能整理.md
  - 移模功能: 08_移模功能整理.md
  - 转盘功能: 09_转盘功能整理.md
  - 中子功能: 10_中子功能整理.md
  - 绞牙功能: 11_绞牙功能整理.md
  - 计时计数功能: 12_计时计数功能整理.md
  - 温度功能: 13_温度功能整理.md
  - 自动流程功能: 14_自动流程功能整理.md
  - 流程图: 15_流程图.md
  - 动作提示列表: 动作提示列表.md
  - 地址点表:
    - 主表: 地址点表_Sheet1.md
    - D0工作表: 地址点表_D0.md
    - D1工作表: 地址点表_D1.md
    - D2工作表: 地址点表_D2.md
    - D3工作表: 地址点表_D3.md
    - MD工作表: 地址点表_MD.md
  - 命名规范文档: 命名规范.md