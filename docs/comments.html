<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论系统</title>
    <style>
        .comments-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eaecef;
        }
        .comment-form {
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .comment-form h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            color: #333;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .submit-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .submit-btn:hover {
            background-color: #0069d9;
        }
        .comments-list {
            margin-top: 2rem;
        }
        .comments-list h3 {
            margin-bottom: 1rem;
            color: #333;
        }
        .comment-item {
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .comment-author {
            font-weight: 500;
            color: #333;
        }
        .comment-date {
            font-size: 12px;
            color: #6c757d;
        }
        .comment-content {
            color: #333;
            line-height: 1.5;
        }
        .no-comments {
            color: #6c757d;
            text-align: center;
            padding: 2rem;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .sync-info {
            font-size: 12px;
            color: #6c757d;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
    <!-- LocalForage库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>
    <div class="comments-container">
        <div class="comment-form">
            <h3>发表评论</h3>
            <form id="commentForm">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">邮箱（可选）</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="content">评论内容</label>
                    <textarea id="content" name="content" required></textarea>
                </div>
                <button type="submit" class="submit-btn">提交评论</button>
            </form>
        </div>
        <div class="comments-list">
            <h3>评论列表</h3>
            <div id="commentsList">
                <div class="no-comments">
                    暂无评论，快来发表第一条评论吧！
                </div>
            </div>
            <div class="sync-info">
                评论存储在本地，刷新页面后仍会保留
            </div>
        </div>
    </div>

    <script>
        // 初始化LocalForage
        localforage.config({
            name: 'procheson-docs',
            storeName: 'comments'
        });

        // 初始化评论列表
        function initComments() {
            localforage.getItem('comments').then(function(comments) {
                renderComments(comments || []);
            }).catch(function(error) {
                console.error('Error loading comments:', error);
                renderComments([]);
            });
        }

        // 渲染评论列表
        function renderComments(comments) {
            const commentsList = document.getElementById('commentsList');
            
            if (!comments || comments.length === 0) {
                commentsList.innerHTML = `
                    <div class="no-comments">
                        暂无评论，快来发表第一条评论吧！
                    </div>
                `;
                return;
            }

            // 按时间排序
            comments.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            let html = '';
            comments.forEach(comment => {
                html += `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-author">${comment.name}</span>
                            <span class="comment-date">${new Date(comment.timestamp).toLocaleString('zh-CN')}</span>
                        </div>
                        <div class="comment-content">${comment.content}</div>
                    </div>
                `;
            });
            
            commentsList.innerHTML = html;
        }

        // 提交评论
        document.getElementById('commentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const content = document.getElementById('content').value;
            
            const comment = {
                id: Date.now().toString(),
                name: name,
                email: email,
                content: content,
                timestamp: new Date().toISOString()
            };
            
            // 获取现有评论
            localforage.getItem('comments').then(function(comments) {
                const existingComments = comments || [];
                existingComments.push(comment);
                
                // 保存评论
                return localforage.setItem('comments', existingComments);
            }).then(function() {
                // 清空表单
                document.getElementById('commentForm').reset();
                
                // 重新渲染评论列表
                initComments();
                
                // 显示成功提示
                alert('评论提交成功！');
            }).catch(function(error) {
                console.error('Error saving comment:', error);
                alert('评论提交失败，请稍后重试');
            });
        });

        // 页面加载时初始化评论
        window.onload = initComments;
    </script>
</body>
</html>
